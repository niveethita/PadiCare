<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PadiCare – Market Prices</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="logo"><a href="index.html" style="color:white">🌾 PadiCare</a></div>
    <ul class="nav-links">
      <li><a href="scanner.html">Disease Scanner</a></li>
      <li><a href="planner.html">Yield Planner</a></li>
      <li><a href="market.html">Market Prices</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>🛒 Market Price Feed</h1>
    <p>Harga pasaran terkini — FAMA Malaysia / Latest market prices</p>
  </div>

  <div class="container">

    <!-- Price Table -->
    <div class="card">
      <h2 style="margin-bottom:16px; color:#1a6b2f">📋 Harga Semasa (RM/kg)</h2>
      <p style="color:#888; font-size:0.85rem; margin-bottom:16px">
        Dikemaskini: <span id="updateDate"></span> — Sumber: FAMA Malaysia
      </p>
      <table class="price-table">
        <thead>
          <tr>
            <th>Tanaman</th>
            <th>Harga (RM/kg)</th>
            <th>Perubahan</th>
            <th>Trend</th>
          </tr>
        </thead>
        <tbody id="priceTableBody"></tbody>
      </table>
    </div>

    <!-- AI Recommendation -->
    <div class="card">
      <h2 style="margin-bottom:16px; color:#1a6b2f">🤖 Cadangan AI</h2>
      <label>Pilih tanaman anda:</label>
      <select id="selectedCrop">
        <option value="">-- Pilih --</option>
      </select>
      <button class="btn-green" onclick="getRecommendation()">💡 Dapatkan Cadangan</button>
      <div class="loader" id="loader"><div class="spinner"></div><p>AI sedang menganalisis...</p></div>
      <div class="result-box" id="resultBox"></div>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="js/market.js"></script>
</body>
</html>
