<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PadiCare – Disease Scanner</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="logo"><a href="index.html" style="color:white">🌾 PadiCare</a></div>
    <ul class="nav-links">
      <li><a href="scanner.html">Disease Scanner</a></li>
      <li><a href="planner.html">Yield Planner</a></li>
      <li><a href="market.html">Market Prices</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>📸 Crop Disease Scanner</h1>
    <p>Upload a photo of your crop leaf — our AI will diagnose it instantly</p>
  </div>

  <div class="container">
    <div class="card">
      <label>Select Crop Type</label>
      <select id="cropType">
        <option value="padi">Padi (Rice)</option>
        <option value="jagung">Jagung (Corn)</option>
        <option value="sayur">Sayur-sayuran (Vegetables)</option>
        <option value="kelapa sawit">Kelapa Sawit (Palm Oil)</option>
      </select>

      <label>Upload Leaf / Crop Photo</label>
      <input type="file" id="imageInput" accept="image/*"/>
      <img id="imagePreview" alt="Preview"/>

      <button class="btn-green" onclick="analyzeImage()">🔍 Analyze My Crop</button>

      <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>AI sedang menganalisis... / AI is analyzing...</p>
      </div>

      <div class="result-box" id="resultBox"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/scanner.js"></script>
</body>
</html>
